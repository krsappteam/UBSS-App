workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/UBSS.xcodeproj \
            --scheme UBSS

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log